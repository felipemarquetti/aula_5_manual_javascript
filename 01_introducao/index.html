<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Introdução - JS Interno</title>
</head>
<body>
    <h1>O que é JavaScript?</h1>
    <p>JavaScript é uma linguagem que traz interatividade. Aqui, o script está <strong>interno</strong>.</p>

    <script>
        // Esta é a forma interna. O código fica entre as tags <script>
        console.log("Olá! Eu sou um script interno e rodo direto do HTML.");
        alert("Bem-vindo ao meu manual de JS!");
    </script>
</body>
</html>
